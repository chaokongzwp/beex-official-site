<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TikTok Authorization Callback | BeeX</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17202a;
        background: #fbfcfd;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(720px, 100%);
        padding: 28px;
        background: #fff;
        border: 1px solid #dce3ea;
        border-radius: 8px;
        box-shadow: 0 24px 70px rgba(23, 32, 42, 0.1);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        color: #627182;
      }

      label {
        display: block;
        margin: 20px 0 8px;
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
      }

      code,
      textarea {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      textarea {
        width: 100%;
        min-height: 96px;
        resize: vertical;
        padding: 12px;
        border: 1px solid #cbd5df;
        border-radius: 8px;
        font-size: 14px;
      }

      .status {
        display: inline-block;
        margin-top: 10px;
        padding: 8px 10px;
        background: #f6c445;
        border-radius: 8px;
        color: #1b1b1b;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TikTok Authorization Callback</h1>
      <p>Copy the authorization code below and send it to the backend tester.</p>

      <label for="code">Auth Code</label>
      <textarea id="code" readonly></textarea>

      <label for="state">State</label>
      <textarea id="state" readonly></textarea>

      <label for="full-url">Full Callback URL</label>
      <textarea id="full-url" readonly></textarea>

      <div id="status" class="status">Waiting for code...</div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code") || params.get("auth_code") || "";
      const state = params.get("state") || "";

      document.getElementById("code").value = code;
      document.getElementById("state").value = state;
      document.getElementById("full-url").value = window.location.href;
      document.getElementById("status").textContent = code
        ? "Authorization code received"
        : "No code found in URL";
    </script>
  </body>
</html>
